services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudway
      POSTGRES_PASSWORD: cloudway
      POSTGRES_DB: cloudway_portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudway -d cloudway_portfolio"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
